name: 终极打包APK
on:
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: 缓存环境
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.buildozer
          key: buildozer-final
      - name: 安装系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y openjdk-17-jdk python3-pip git wget unzip libtinfo5 zlib1g-dev
      - name: 安装稳定Python库
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install cython==0.29.36 buildozer==1.5.0
      - name: 修复Android SDK+自动许可
        run: |
          export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p $ANDROID_HOME/{tools/bin,cmdline-tools,licenses}
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip -O ct.zip
          unzip -q ct.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          cp $ANDROID_HOME/cmdline-tools/latest/bin/* $ANDROID_HOME/tools/bin/
          echo "8933bad15afe2731585e87b337a1aec268514d7c" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451184e1cd729ef15c71a78b31eac" >> $ANDROID_HOME/licenses/android-sdk-license
      - name: 构建APK
        run: buildozer android debug --verbose
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-APK
          path: bin/*.apk
