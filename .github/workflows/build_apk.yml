name: 打包Python为APK（终极版）

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装纯净依赖（锁定版本）
        run: |
          sudo apt update -y
          sudo apt install -y openjdk-17-jdk python3-pip git
          # 配置国内镜像（加速）
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          # 🔴 锁定绝对稳定版本（不更新，不报错）
          pip install cython==0.29.36
          pip install buildozer==1.5.0

      - name: 构建APK（单架构无压力）
        run: buildozer android debug --verbose

      - name: 上传APK文件
        uses: actions/upload-artifact@v4
        with:
          name: GardenBabyTest-APK
          path: bin/*.apk
