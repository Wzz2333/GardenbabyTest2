name: 打包APK
on: push: branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: 安装环境
      run: |
        sudo apt update
        pip install buildozer cython
    - name: 构建APK
      run: buildozer -v android debug
    - name: 上传APK
      uses: actions/upload-artifact@v4
      with:
        name: my-apk
        path: bin/*.apk
